services:
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=1iyOhDNi5XQYrJYkbqMHX9K-M20d1X0qJ-ZyK4dh50E=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data  # ДОБАВЛЕНО: для базы данных
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin &&
        echo 'Initialization complete.'
      "

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=1iyOhDNi5XQYrJYkbqMHX9K-M20d1X0qJ-ZyK4dh50E=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data  # ДОБАВЛЕНО: для базы данных
      - ./logs:/opt/airflow/logs  # ДОБАВЛЕНО: для логов
      - ./plugins:/opt/airflow/plugins  # ДОБАВЛЕНО: для плагинов
      - .:/opt/airflow/project  # Оставлено для доступа к проекту
    ports:
      - "8080:8080"
    command: >
      bash -c "
        pip install streamlit requests pandas openmeteo-requests geopy polars &&
        airflow webserver
      "

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__FERNET_KEY=1iyOhDNi5XQYrJYkbqMHX9K-M20d1X0qJ-ZyK4dh50E=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data  # ДОБАВЛЕНО: для базы данных
      - ./logs:/opt/airflow/logs  # ДОБАВЛЕНО: для логов
      - ./plugins:/opt/airflow/plugins  # ДОБАВЛЕНО: для плагинов
      - .:/opt/airflow/project  # Оставлено для доступа к проекту
    command: >
      bash -c "
        pip install requests pandas openmeteo-requests geopy polars &&
        airflow scheduler
      "

volumes:
  airflow_data:
